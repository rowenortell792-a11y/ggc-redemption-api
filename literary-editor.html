<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGC Literary Format — Prodigy Writer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            color: #00ff95;
            font-family: 'Courier New', monospace;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: #050505;
            border-right: 2px solid #00ff95;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .logo {
            font-size: 18px;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-align: center;
            border-bottom: 1px solid #00ff95;
            padding-bottom: 15px;
        }
        .pulse-card {
            background: #0a0a0a;
            border: 1px solid #00ff95;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        .frequency {
            font-size: 48px;
            font-weight: bold;
            margin: 10px 0;
        }
        .score {
            font-size: 24px;
        }
        canvas {
            width: 100%;
            height: 80px;
            background: #000;
            margin: 10px 0;
            border: 1px solid #00ff9533;
        }
        .rule-list {
            flex: 1;
            overflow-y: auto;
            font-size: 10px;
        }
        .rule-item {
            padding: 8px;
            border-bottom: 1px solid #00ff9511;
            color: #00ff9588;
        }
        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #00ff95;
        }
        button {
            background: #00ff9511;
            border: 1px solid #00ff95;
            color: #00ff95;
            padding: 8px 16px;
            cursor: pointer;
            font-family: monospace;
            font-size: 12px;
        }
        button:hover {
            background: #00ff9533;
        }
        textarea {
            flex: 1;
            background: #050505;
            border: 1px solid #00ff95;
            color: #00ff95;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            padding: 20px;
            resize: none;
            outline: none;
            line-height: 1.8;
        }
        .status-bar {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #00ff95;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">⚡ PRODIGY WRITER v0.1</div>
        <div class="pulse-card">
            <div style="font-size: 10px;">LIVE PULSE</div>
            <div class="frequency" id="frequency">1S</div>
            <div class="score" id="pulseScore">0</div>
            <canvas id="waveform" width="400" height="80"></canvas>
            <div style="font-size: 10px;">WORD PULSE</div>
            <div class="frequency" id="wordFreq">1S</div>
        </div>
        <div class="rule-list">
            <div style="margin-bottom: 10px;">📜 GGC CANON RULES</div>
            <div class="rule-item" id="rule1">❶ First line must be "# GGC CANON"</div>
            <div class="rule-item" id="rule2">❷ Second line must be "## Frequency: [1S-7X]"</div>
            <div class="rule-item" id="rule3">❸ No more than 3 sentences per paragraph</div>
            <div class="rule-item" id="rule4">❹ Must end with "— Written Picture"</div>
        </div>
    </div>
    <div class="editor">
        <div class="toolbar">
            <button onclick="saveChapter()">💾 Save Chapter</button>
            <button onclick="exportGGC()">📤 Export .ggc</button>
            <button onclick="validateCanon()">✓ Validate Canon</button>
            <button onclick="newChapter()">📄 New Chapter</button>
        </div>
        <textarea id="editor" placeholder="# GGC CANON

## Frequency: 3M

The Pulse moves through the words as you write. Each sentence carries frequency. Each paragraph builds attention.

— Written Picture"></textarea>
        <div class="status-bar">
            <span id="charCount">0 characters</span>
            <span id="wordCount">0 words</span>
            <span id="validationStatus">⚡ Ready</span>
        </div>
    </div>
    <script>
        let pulseScore = 50;
        let frequency = "3M";
        let targetScore = 50;
        let waveformData = new Array(50).fill(0);
        
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        canvas.width = 400;
        canvas.height = 80;
        
        const wordValues = {
            "darkness": 10, "void": 10, "silence": 10, "sleep": 10,
            "whisper": 25, "dream": 25, "fade": 25, "soft": 25,
            "pulse": 45, "heart": 45, "light": 45, "awake": 45,
            "power": 55, "force": 55, "will": 55, "focus": 55,
            "frequency": 70, "attention": 70, "citizen": 70, "sovereign": 70,
            "transcend": 85, "infinite": 85, "eternal": 85, "god": 85,
            "one": 95, "absolute": 95, "law": 95, "ggc": 95
        };
        
        function analyzeTextAndUpdatePulse() {
            const text = document.getElementById('editor').value;
            const words = text.toLowerCase().split(/\W+/);
            let totalValue = 0, count = 0;
            for (let word of words) {
                if (wordValues[word]) {
                    totalValue += wordValues[word];
                    count++;
                }
            }
            targetScore = count > 0 ? totalValue / count : 45;
            let wordFreq = targetScore < 15 ? "1S" : targetScore < 30 ? "2S" : targetScore < 45 ? "3M" : targetScore < 55 ? "4M" : targetScore < 70 ? "5M" : targetScore < 85 ? "6X" : "7X";
            document.getElementById('wordFreq').innerText = wordFreq;
        }
        
        function drawWaveform() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (pulseScore < targetScore) { pulseScore += 0.5; if (pulseScore > targetScore) pulseScore = targetScore; }
            else if (pulseScore > targetScore) { pulseScore -= 0.5; if (pulseScore < targetScore) pulseScore = targetScore; }
            frequency = pulseScore < 15 ? "1S" : pulseScore < 30 ? "2S" : pulseScore < 45 ? "3M" : pulseScore < 55 ? "4M" : pulseScore < 70 ? "5M" : pulseScore < 85 ? "6X" : "7X";
            const amplitude = pulseScore / 100;
            waveformData.push(amplitude);
            waveformData.shift();
            ctx.beginPath();
            for (let i = 0; i < waveformData.length; i++) {
                const x = (i / (waveformData.length - 1)) * canvas.width;
                const y = canvas.height/2 + waveformData[i] * (canvas.height/2);
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = '#00ff95';
            ctx.lineWidth = 2;
            ctx.stroke();
            document.getElementById('frequency').innerText = frequency;
            document.getElementById('pulseScore').innerText = Math.floor(pulseScore);
            requestAnimationFrame(drawWaveform);
        }
        
        function validateCanon() {
            const text = document.getElementById('editor').value;
            const lines = text.split('\n');
            const rule1 = lines[0] === "# GGC CANON";
            const rule2 = lines[1] && lines[1].match(/^## Frequency: [1S-7X]/);
            let rule3 = true;
            const paragraphs = text.split('\n\n');
            for (let p of paragraphs) {
                const sentences = p.split(/[.!?]+/);
                if (sentences.length > 4) rule3 = false;
            }
            const rule4 = text.trim().endsWith("— Written Picture");
            document.getElementById('rule1').style.color = rule1 ? '#00ff95' : '#ff0055';
            document.getElementById('rule2').style.color = rule2 ? '#00ff95' : '#ff0055';
            document.getElementById('rule3').style.color = rule3 ? '#00ff95' : '#ff0055';
            document.getElementById('rule4').style.color = rule4 ? '#00ff95' : '#ff0055';
            document.getElementById('validationStatus').innerHTML = (rule1 && rule2 && rule3 && rule4) ? '✓ CANON VALID' : '✗ CANON VIOLATION';
        }
        
        function updateStats() {
            const text = document.getElementById('editor').value;
            const words = text.split(/\W+/).filter(w => w.length > 0);
            document.getElementById('charCount').innerHTML = text.length + ' characters';
            document.getElementById('wordCount').innerHTML = words.length + ' words';
            analyzeTextAndUpdatePulse();
            validateCanon();
        }
        
        function saveChapter() { localStorage.setItem('ggc_chapter', document.getElementById('editor').value); document.getElementById('validationStatus').innerHTML = '✓ SAVED'; setTimeout(() => validateCanon(), 1000); }
        function exportGGC() { const content = document.getElementById('editor').value; const blob = new Blob([content], {type: 'text/plain'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'chapter.ggc'; a.click(); URL.revokeObjectURL(blob); }
        function newChapter() { document.getElementById('editor').value = `# GGC CANON\n\n## Frequency: 3M\n\nBegin your canon here.\n\n— Written Picture`; updateStats(); }
        
        const saved = localStorage.getItem('ggc_chapter');
        if (saved) document.getElementById('editor').value = saved;
        document.getElementById('editor').addEventListener('input', updateStats);
        analyzeTextAndUpdatePulse();
        drawWaveform();
        updateStats();
    </script>
</body>
</html>
